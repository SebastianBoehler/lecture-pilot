services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://lecturepilot:${LECTUREPILOT_POSTGRES_PASSWORD:-lecturepilot-dev}@db:5432/lecturepilot
      LECTUREPILOT_ENV: production
      LECTUREPILOT_AUTH_MODE: session
      LECTUREPILOT_SESSION_SECRET: ${LECTUREPILOT_SESSION_SECRET:?Set LECTUREPILOT_SESSION_SECRET before deployment}
      LECTUREPILOT_MAX_REQUEST_BYTES: ${LECTUREPILOT_MAX_REQUEST_BYTES:-629145600}
      LECTUREPILOT_RATE_LIMIT_ENABLED: ${LECTUREPILOT_RATE_LIMIT_ENABLED:-true}
      LECTUREPILOT_RATE_LIMIT_LOGIN_PER_MINUTE: ${LECTUREPILOT_RATE_LIMIT_LOGIN_PER_MINUTE:-30}
      LECTUREPILOT_RATE_LIMIT_CHAT_PER_MINUTE: ${LECTUREPILOT_RATE_LIMIT_CHAT_PER_MINUTE:-120}
      LECTUREPILOT_RATE_LIMIT_PAID_PER_MINUTE: ${LECTUREPILOT_RATE_LIMIT_PAID_PER_MINUTE:-60}
    ports:
      - "8000:8000"
    volumes:
      - lecturepilot-workspaces:/app/storage/workspaces

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lecturepilot
      POSTGRES_USER: lecturepilot
      POSTGRES_PASSWORD: ${LECTUREPILOT_POSTGRES_PASSWORD:-lecturepilot-dev}
    volumes:
      - lecturepilot-postgres:/var/lib/postgresql/data

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  lecturepilot-postgres:
  lecturepilot-workspaces:
