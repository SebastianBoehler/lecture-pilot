services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - lecturepilot-workspaces:/app/storage/workspaces

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  lecturepilot-workspaces:

