name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api-test-suite:
    name: API test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[test,agent]"
      - name: Run API lint
        run: python -m ruff check apps/api/src apps/api/tests
      - name: Run API test suite
        run: pytest apps/api/tests

  ui-test-suite:
    name: UI test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install UI dependencies
        run: npm install
      - name: Run UI lint
        run: npm run lint:web
      - name: Run UI dead-code scan
        run: npm run dead-code
      - name: Run UI test suite
        run: npm run test --workspace apps/web
      - name: Build UI
        run: npm run build --workspace apps/web
