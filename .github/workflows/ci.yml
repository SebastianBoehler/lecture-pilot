name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api-test-suite:
    name: API test suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lecturepilot_test
          POSTGRES_USER: lecturepilot
          POSTGRES_PASSWORD: lecturepilot-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lecturepilot -d lecturepilot_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://lecturepilot:lecturepilot-test@127.0.0.1:5432/lecturepilot_test
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c apps/api/requirements.lock -e "apps/api[test,agent,tuebingen]"
          pip install -e apps/latex-compiler
      - name: Verify database migrations
        run: |
          alembic -c apps/api/alembic.ini upgrade head
          alembic -c apps/api/alembic.ini check
          alembic -c apps/api/alembic.ini downgrade base
          alembic -c apps/api/alembic.ini upgrade head
      - name: Verify API and compiler
        run: npm run verify:api

  ui-test-suite:
    name: UI test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install UI dependencies
        run: npm ci
      - name: Verify UI
        run: npm run verify:web
